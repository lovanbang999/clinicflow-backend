services:
  # ──────────────────────────────────────────────
  # MySQL Database
  # ──────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: smartclinic-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: smartclinic
      MYSQL_USER: bang
      MYSQL_PASSWORD: bang123
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - smartclinic_backend_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────
  # NestJS Backend
  # ──────────────────────────────────────────────
  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/lovanbang999/smartclinic-backend:latest}
    container_name: smartclinic_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: mysql://bang:bang123@mysql:3306/smartclinic
      PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - smartclinic_backend_net

  # ──────────────────────────────────────────────
  # Redis Cache Store
  # ──────────────────────────────────────────────
  redis:
    image: redis:alpine
    container_name: smartclinic-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    environment:
      - REDIS_PASSWORD=smartclinic_secure_pass
    command: redis-server --requirepass smartclinic_secure_pass
    networks:
      - smartclinic_backend_net

volumes:
  mysql_data:
    driver: local
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  smartclinic_backend_net:
    driver: bridge
